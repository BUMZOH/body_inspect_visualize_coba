<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>異常処置確認</title>
</head>
<body>

    <label for="abnormal_action">
        異常処置有無：
    </label>

    <select id="abnormal_action">
        <option value="">選択してください</option>
        <option value="あり">あり</option>
        <option value="なし">なし</option>
    </select>

    <script>

        const select = document.getElementById(
            "abnormal_action"
        );

        select.addEventListener(
            "change",
            function () {
                if (
                    this.value === "あり"
                ) {
                    alert( "異常処置はしましたか？");
                }
            }
        );

    </script>

</body>
</html>
